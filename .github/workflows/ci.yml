name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-app:
    name: Build app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build (Release, unsigned)
        run: |
          xcodebuild \
            -project MacOSTSKMGR.xcodeproj \
            -scheme MacOSTSKMGR \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build

  unit-tests:
    name: Metrics unit tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run MetricsKit tests
        working-directory: MetricsKit
        run: swift test --parallel
