name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-app:
    name: Build app
    # Pinned to macos-26 (not macos-latest): the app's deployment target is
    # macOS 26.0, so it can only be built on a runner that ships the macOS 26
    # SDK. macos-latest is currently mid-migration and non-deterministically
    # lands on either macOS 15 (SDK 15.5, build fails) or macOS 26.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
      - name: Build (Release, unsigned)
        run: |
          xcodebuild \
            -project MacOSTSKMGR.xcodeproj \
            -scheme MacOSTSKMGR \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build

  unit-tests:
    name: Metrics unit tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
      - name: Run MetricsKit tests
        working-directory: MetricsKit
        run: swift test --parallel
